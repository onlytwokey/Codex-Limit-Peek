<svg width="920" height="360" viewBox="0 0 920 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="920" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EAF8FF"/>
      <stop offset="1" stop-color="#F8FDFF"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.74"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.52"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-28%" width="140%" height="170%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#6E9DB3" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="920" height="360" fill="url(#pageBg)"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', sans-serif">
    <text x="460" y="48" text-anchor="middle" font-size="30" font-weight="780" fill="#172D3D">菜单栏用量颜色</text>
    <text x="460" y="79" text-anchor="middle" font-size="18" font-weight="650" fill="#5E7888">绿色表示充足，黄色表示一般，红色表示快用完</text>

    <g transform="translate(94 118)" filter="url(#cardShadow)">
      <rect width="232" height="182" rx="25" fill="url(#cardBg)"/>
      <rect x="1" y="1" width="230" height="180" rx="24" stroke="white" stroke-opacity="0.72" stroke-width="2"/>
      <rect x="28" y="28" width="176" height="44" rx="12" fill="#B8F3D1"/>
      <text x="116" y="58" text-anchor="middle" font-size="26" font-weight="820" fill="#103F28">74% | 3h29m</text>
      <rect x="42" y="104" width="148" height="12" rx="6" fill="#DDF2E7"/>
      <rect x="42" y="104" width="148" height="12" rx="6" fill="#31CB62"/>
      <text x="116" y="146" text-anchor="middle" font-size="23" font-weight="780" fill="#17462D">额度充足</text>
    </g>

    <g transform="translate(344 118)" filter="url(#cardShadow)">
      <rect width="232" height="182" rx="25" fill="url(#cardBg)"/>
      <rect x="1" y="1" width="230" height="180" rx="24" stroke="white" stroke-opacity="0.72" stroke-width="2"/>
      <rect x="28" y="28" width="176" height="44" rx="12" fill="#F8E8B6"/>
      <text x="116" y="58" text-anchor="middle" font-size="26" font-weight="820" fill="#3A2D0B">39% | 1h42m</text>
      <rect x="42" y="104" width="148" height="12" rx="6" fill="#F4EED6"/>
      <rect x="42" y="104" width="148" height="12" rx="6" fill="#F6C84A"/>
      <text x="116" y="146" text-anchor="middle" font-size="23" font-weight="780" fill="#5A4512">额度一般</text>
    </g>

    <g transform="translate(594 118)" filter="url(#cardShadow)">
      <rect width="232" height="182" rx="25" fill="url(#cardBg)"/>
      <rect x="1" y="1" width="230" height="180" rx="24" stroke="white" stroke-opacity="0.72" stroke-width="2"/>
      <rect x="38" y="28" width="156" height="44" rx="12" fill="#FFC8C7"/>
      <text x="116" y="58" text-anchor="middle" font-size="26" font-weight="820" fill="#4A1213">12% | 35m</text>
      <rect x="42" y="104" width="148" height="12" rx="6" fill="#F6DEDD"/>
      <rect x="42" y="104" width="148" height="12" rx="6" fill="#FF5F57"/>
      <text x="116" y="146" text-anchor="middle" font-size="23" font-weight="780" fill="#6A1F1F">额度偏低</text>
    </g>
  </g>
</svg>
